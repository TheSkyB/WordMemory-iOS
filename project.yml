name: WordMemory
options:
  bundleIdPrefix: com.wordmemory
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  WordMemory:
    type: application
    platform: iOS
    sources:
      - WordMemory
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wordmemory.app
        INFOPLIST_FILE: WordMemory/Info.plist
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    info:
      path: WordMemory/Info.plist
      properties:
        CFBundleDisplayName: "单词记忆"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiresFullScreen: YES
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
