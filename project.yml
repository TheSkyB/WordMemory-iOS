name: WordMemory
options:
  bundleIdPrefix: com.wordmemory
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

targets:
  WordMemory:
    type: application
    platform: iOS
    sources:
      - path: WordMemory
        excludes:
          - "Resources/Assets.xcassets"
    settings:
      base:
        PRODUCT_NAME: WordMemory
        PRODUCT_BUNDLE_IDENTIFIER: com.wordmemory.app
        INFOPLIST_FILE: WordMemory/Info.plist
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
      configs:
        Debug:
          ENABLE_PREVIEWS: YES
          SWIFT_OPTIMIZATION_LEVEL: -Onone
        Release:
          ENABLE_PREVIEWS: YES
          SWIFT_OPTIMIZATION_LEVEL: -Onone
    info:
      path: WordMemory/Info.plist
      properties:
        CFBundleDisplayName: "单词记忆"
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIRequiresFullScreen: YES
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
