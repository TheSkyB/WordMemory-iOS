name: Build IPA

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.0'
    
    - name: Install xcodegen
      run: brew install xcodegen
    
    - name: Generate Xcode Project
      run: |
        cd ${{ github.workspace }}
        xcodegen generate
    
    - name: Resolve Package Dependencies
      run: |
        xcodebuild -resolvePackageDependencies -project WordMemory.xcodeproj -scheme WordMemory
      continue-on-error: true
    
    - name: Build App (No Signing)
      run: |
        xcodebuild \
          -project WordMemory.xcodeproj \
          -scheme WordMemory \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build
    
    - name: Create IPA
      run: |
        # Find the built app
        APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WordMemory.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ App not found in DerivedData"
          exit 1
        fi
        
        echo "✅ Found app: $APP_PATH"
        
        # Create IPA
        mkdir -p build/Payload
        cp -r "$APP_PATH" build/Payload/
        cd build
        zip -r WordMemory-unsigned.ipa Payload
        
        echo "✅ IPA created: $(ls -lh WordMemory-unsigned.ipa)"
    
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: WordMemory-unsigned
        path: build/WordMemory-unsigned.ipa
        retention-days: 30
